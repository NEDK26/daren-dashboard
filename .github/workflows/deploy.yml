name: Deploy to Alibaba Cloud

on:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd /home/deploy/daren-dashboard
            git fetch origin master
            git reset --hard origin/master
            DEPLOYMENT_BACKUP_DIR=/home/deploy/backups/daren-dashboard node scripts/backup-deployment.js
            npm ci --omit=dev
            npx pm2 restart daren-dashboard || npx pm2 start ecosystem.config.js
            npx pm2 save
            sleep 2
            curl --fail --silent --show-error http://127.0.0.1:3001/ > /dev/null
            curl --fail --silent --show-error http://127.0.0.1:3001/api/deployment-config | grep '"code":"default"'
            echo "Deployment record: commit=$(git rev-parse HEAD) profile=default deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
