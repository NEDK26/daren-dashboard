name: Deploy SJ Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: '已验证的分支、Tag 或 Commit SHA'
        required: true
        default: sj-prod

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build frontend
        run: npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SJ_SERVER_HOST }}
          username: ${{ secrets.SJ_SERVER_USER }}
          key: ${{ secrets.SJ_SERVER_SSH_KEY }}
          port: ${{ secrets.SJ_SERVER_PORT || 22 }}
          script: |
            set -e
            cd /home/deploy/daren-dashboard
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm use 22
            fi
            node -p "'Remote Node.js ' + process.version + ' at ' + process.execPath"
            node -e "if (Number(process.versions.node.split('.')[0]) < 22) { console.error('Node.js 22+ required'); process.exit(1); }"
            test -f .env
            DEPLOYMENT_BACKUP_DIR=/home/deploy/backups/daren-dashboard node scripts/backup-deployment.js
            git fetch --prune origin "${{ inputs.ref }}"
            git reset --hard FETCH_HEAD
            node scripts/verify-deployment-env.js sj
            npm ci --omit=dev
            npx --yes pm2 restart daren-dashboard || npx --yes pm2 start ecosystem.config.js
            npx --yes pm2 save
            sleep 2
            curl --fail --silent --show-error http://127.0.0.1:3001/ > /dev/null
            health=$(curl --fail --silent --show-error http://127.0.0.1:3001/api/health)
            echo "$health" | grep '"status":"ok"'
            echo "$health" | grep '"deployment":"sj"'
            echo "Deployment record: commit=$(git rev-parse HEAD) profile=sj deployed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
